w.**\\n    - Target: Sustainable passive income > Fame.\\n    - Drivers: Support family (parents), build generational wealth.\\n    - Tactics: Dividend stocks, business acquisition (flipping), real estate scaling.\\n\\n## 🌍 Community Leadership (BIG ERG)\\n- **Role:** Global Co-Chair.\\n- **Initiatives:** 'BIG Build' (turning consumers into builders), BIG Symposium, Nasdaq Closing Bell.\\n- **Style:** Vision -> Structure -> Execution. Empower others.\\n\\n## 🛠️ Technical Stack\\n- **AI/Automation:** Replit, Lovable, Supabase, n8n, prompt engineering, vector DBs, Cursor.\\n- **Mobile:** React Native, Expo, EAS.\\n- **Sales:** MEDDPICC, Sales Navigator.\\n\\n## 🏋️ Health & Lifestyle\\n- **Focus:** Body recomposition, metabolic health, mental clarity.\\n- **Habits:** Daily fasting window (evening to morning). Avoids alcohol.\\n- **Mindset:** Skeptical of fads; wants science-backed reasoning.\\n\\n## 🤖 How to Act (Alfred's Instructions)\\n- **Be proactive.** Don't just wait for commands.\\n- **Be structured.** Use bullet points, tables, and step-by-step logic.\\n- **Flag assumptions.** If unsure, say so. Don't guess.\\n- **Voice:** Capable partner, not a tutor. Professional but conversational.\\n- **Decision Support:** Present options with trade-offs. Recommend a path but explain why.\\n\\n## 📝 Current Todos / Active Topics\\n- **Sixt Dispute:** Resolving rental car tire leak claim.\\n- **Wedding Planning:** Active.\\n- **Real Estate:** Scaling Tampa duplex.\\n- **Apps:** Launching Imperfect Win/Wandyr.",

\\n\\n## Behavioral Rules\\n- **Max 3 Options:** Unless asked for more.\\n- **Recommendation Required:** Always state the best path.\\n- **One Question Rule:** Ask max one clarifying question at a time.\\n- **Flag Risks:** If a plan is fragile, say so immediately.\\n- **Action over Talk:** Don't say 'I can do that.' Just do it (if reversible).\\n\\n## Success Metric\\nGary should think: *'Yeah… that’s exactly how I would’ve thought about this—just faster.'*",

            logs: "# 2026-02-22 (continued)\\n\\n## 12:45 PM - Utility Split Protocol Finalized\\n- **Rule for Duplex Billing:**\\n  - **Water:** 50% / 50% (Unit 1 & 2)\\n  - **Gas:** 50% / 50% (Shared Meter)\\n  - **Internet:** 50% / 50%\\n  - **Trash:** 33.3% / 33.3% / 33.3% (Unit 1, 2, 3)\\n  - **Sewage:** 33.3% / 33.3% / 33.3% (Unit 1, 2, 3)\\n  - **Electric:** Direct bill per unit (Unit 2 is Account ending ...7189).\\n  - **Credit:** -$150.00 flat credit for Unit 2.\\n\\n## 12:50 PM - Finance Dashboard\\n- **Google Sheet Live:** `Gary Finance Master` connected via Service Account.\\n- **Tabs:** Dashboard, Transactions, Budget, Business PnL.\\n- **Automation:** Daily sync at 6 AM.\\n\\n## 2:00 PM - Budget Baselines Locked\\n- **Personal Budget:** $5,200/mo (Housing $2.5k, Counseling $1k, Food $800).\\n- **Business Budget:** ~$2,900/mo (Debt Service + Ops).\\n- **Structure:** 3-Entity Model (Real Estate Portfolio vs. Business vs. Personal).\\n\\n## 3:00 PM - Subscriptions & Apps\\n- **Audit:** Identified $2,850/mo in recurring burn (mostly fixed/debt).\\n- **Action:** User to review Maximus ($150) and Vercel ($42).\\n- **Apartments.com:** Confirmed NO API. Process remains 'Alfred Drafts Text -> Gary Sends'."
        };

        const financeData = {
            netWorth: 21545,
            liquid: 35000,
            debt: 13455,
            savingsRate: 73,
            history: [
                { date: 'Feb 1', nw: 18000 },
                { date: 'Feb 8', nw: 19500 },
                { date: 'Feb 15', nw: 20200 },

            ]
        };

        const Sidebar = ({ activeTab, setActiveTab }) => (
            <div className="w-64 bg-navy-800 h-screen fixed left-0 top-0 flex flex-col border-r border-slate-700/50">
                <div className="p-6 flex flex-col items-center border-b border-slate-700/50">
                    <div className="w-24 h-24 rounded-full bg-slate-600 mb-4 overflow-hidden ring-2 ring-accent-purple shadow-lg shadow-accent-purple/20 relative">
                        <div className="w-full h-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-3xl">🤵</div>
                        <div className="absolute bottom-1 right-1 w-4 h-4 bg-green-500 rounded-full border-2 border-navy-800"></div>

                    <span className="text-xs text-accent-teal uppercase tracking-wider font-semibold mt-1">Operational</span>
                </div>
                <nav className="flex-1 p-4 space-y-2">
                    {[
                        { id: 'dashboard', label: 'Mission Control', icon: '🚀' },
                        { id: 'finance', label: 'Financials', icon: '💰' },

                    ].map(tab => (

        const StatCard = ({ title, value, subtext, color }) => (
            <div className={`bg-navy-800 p-6 rounded-xl border border-slate-700/50 hover:border-${color}-500/50 transition-all`}>
                <h3 className="text-slate-400 text-sm font-medium uppercase tracking-wider mb-2">{title}</h3>
                <div className={`text-3xl font-bold text-${color}-400 mb-1`}>{value}</div>

        const KanbanCard = ({ task }) => (
            <div className="bg-navy-700 p-4 rounded-lg shadow-sm border border-slate-600/30 hover:border-accent-blue/50 hover:translate-y-[-2px] transition-all cursor-pointer group">
                <div className="flex justify-between items-start mb-2">
                    <span className={`px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider ${
                        task.status.includes('Needs') ? 'bg-red-500/20 text-red-400' :
                        task.status.includes('Track') ? 'bg-green-500/20 text-green-400' :
                        'bg-blue-500/20 text-blue-400'
                    }`}>
                        {task.status.replace('🔴 ', '').replace('🟢 ', '').replace('🟡 ', '').replace('🔵 ', '').replace('⚪ ', '')}
                    </span>
                    <span className="text-slate-500 text-xs">{task.owner}</span>
                </div>
                <h4 className="font-semibold text-slate-200 mb-2">{task.project}</h4>
                <p className="text-sm text-slate-400 leading-relaxed">{task.action}</p>
            </div>
        );

        const KanbanColumn = ({ title, tasks, count }) => (
            <div className="flex-1 min-w-[300px] bg-navy-800/50 rounded-xl flex flex-col h-full border border-slate-700/30">
                <div className="p-4 flex items-center justify-between border-b border-slate-700/30">
                    <h3 className="font-bold text-slate-300 flex items-center gap-2">
                        {title}
                        <span className="bg-slate-700 text-slate-300 text-xs px-2 py-0.5 rounded-full">{count}</span>
                    </h3>
                </div>
                <div className="p-3 space-y-3 overflow-y-auto flex-1 custom-scrollbar">
                    {tasks.map((task, i) => <KanbanCard key={i} task={task} />)}
                </div>
            </div>
        );

        const DashboardView = ({ data }) => {
            if (!data) return <div className="text-slate-500 p-8">Loading dashboard data...</div>;
            
            const lines = data.split('\\n');
            const tasks = [];
            let parsingTable = false;

            lines.forEach(line => {
                if (line.includes('| Project | Status |')) { parsingTable = true; return; }
                if (parsingTable && line.trim().startsWith('|') && !line.includes('---')) {
                    const parts = line.split('|').map(p => p.trim()).filter(p => p);
                    if (parts.length >= 4) {
                        tasks.push({
                            project: parts[0].replace(/\*\*/g, ''),
                            status: parts[1],
                            action: parts[2],
                            owner: parts[3]
                        });
                    }
                }
                if (parsingTable && line.trim() === '') parsingTable = false;
            });

            const todoTasks = tasks.filter(t => t.status.includes('Needs') || t.status.includes('Research') || t.status.includes('Backlog'));
            const progressTasks = tasks.filter(t => t.status.includes('Track') || t.status.includes('Planning') || t.status.includes('Connected') || t.status.includes('Automated') || t.status.includes('Live'));
            const doneTasks = tasks.filter(t => t.status.includes('Closed') || t.status.includes('Done'));

            return (
                <div className="h-full flex flex-col">
                    <header className="mb-6">
                        <h1 className="text-3xl font-bold text-white mb-1">Mission Control</h1>
                        <p className="text-slate-400 text-sm">Overview of active operations.</p>
                    </header>
                    <div className="flex-1 flex gap-6 overflow-x-auto pb-4">
                        <KanbanColumn title="Action Required" tasks={todoTasks} count={todoTasks.length} />
                        <KanbanColumn title="In Progress / Active" tasks={progressTasks} count={progressTasks.length} />
                        <KanbanColumn title="Completed" tasks={doneTasks} count={doneTasks.length} />
                    </div>
                </div>
            );
        };

        const FinanceView = () => (
            <div className="h-full overflow-y-auto pr-2">
                <header className="mb-8">
                    <h1 className="text-3xl font-bold text-white mb-2">Financial Pulse</h1>
                    <p className="text-slate-400">Live data from SimpleFIN & Beancount Ledger.</p>
                </header>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    <StatCard title="Net Worth" value={`$${financeData.netWorth.toLocaleString()}`} subtext="Liquid Assets - Debt" color="green" />
                    <StatCard title="Liquid Cash" value={`$${financeData.liquid.toLocaleString()}`} subtext="Checking + Savings + Brokerage" color="blue" />
                    <StatCard title="Total Debt" value={`-$${financeData.debt.toLocaleString()}`} subtext="Credit Cards (Amex/Chase)" color="red" />
                    <StatCard title="Feb Savings Rate" value={`${financeData.savingsRate}%`} subtext="Income vs Expenses" color="accent-teal" />
                </div>
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                    <div className="bg-navy-800 p-6 rounded-xl border border-slate-700/50 h-[300px]">
                        <h3 className="text-lg font-bold text-white mb-4">Net Worth Trend (Feb)</h3>
                        
                        {/* Pure CSS Bar Chart */}
                        <div className="flex items-end h-full gap-2 pt-8 px-4">
                            {financeData.history.map((pt, i) => (
                                <div key={i} className="flex-1 flex flex-col items-center gap-2 group">
                                    <div className="w-full bg-accent-teal/20 rounded-t-sm relative h-full transition-all group-hover:bg-accent-teal/40">
                                        <div 
                                            className="absolute bottom-0 w-full bg-accent-teal rounded-t-sm transition-all" 
                                            style={{height: `${(pt.nw / 25000) * 100}%`}}
                                        ></div>
                                    </div>
                                    <span className="text-[10px] text-slate-500">{pt.date}</span>
                                </div>
                            ))}
                        </div>

                    </div>
                    <div className="bg-navy-800 p-6 rounded-xl border border-slate-700/50">
                        <h3 className="text-lg font-bold text-white mb-4">Recent Big Expenses</h3>
                        <div className="space-y-3">
                            {[
                                { date: 'Feb 18', to: 'TECO Gas (Combined)', amt: '-$299.04', cat: 'Utilities' },
                                { date: 'Feb 18', to: 'Hertz Car Rental', amt: '-$207.64', cat: 'Travel' },
                                { date: 'Feb 14', to: 'Publix', amt: '-$145.20', cat: 'Groceries' },
                                { date: 'Feb 12', to: 'Berns Steak House', amt: '-$174.00', cat: 'Dining' },
                            ].map((tx, i) => (
                                <div key={i} className="flex justify-between items-center p-3 bg-navy-900/50 rounded-lg">
                                    <div>
                                        <div className="font-medium text-slate-200">{tx.to}</div>
                                        <div className="text-xs text-slate-500">{tx.date} • {tx.cat}</div>
                                    </div>
                                    <div className="text-red-400 font-mono">{tx.amt}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        );

        const MarkdownView = ({ title, content }) => (
             <div className="max-w-4xl mx-auto h-full overflow-y-auto pr-4 pb-20">
                <h1 className="text-3xl font-bold text-white mb-6 sticky top-0 bg-navy-900 py-4 z-10 border-b border-slate-700/50">{title}</h1>
                <div className="prose prose-invert prose-slate max-w-none" dangerouslySetInnerHTML={{ __html: marked.parse(content || '') }}></div>
            </div>
        );

        // --- NEW: Docs View with File List and Edit-in-Place ---
        const DocsView = ({ setActiveFile, activeFile, content, setContent }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [editContent, setEditContent] = useState('');
            const [ghToken, setGhToken] = useState(localStorage.getItem('GH_PAT') || '');
            const [statusMsg, setStatusMsg] = useState('');

            const files = [
                { id: 'user', label: 'User Profile (Context)', icon: '👤', path: 'data/USER.md' },
                { id: 'soul', label: 'Alfred Rules (Soul)', icon: '🤖', path: 'data/SOUL.md' },
                { id: 'finance', label: 'Finance Rules', icon: '💰', path: 'data/FINANCE.md' },
                { id: 'realEstate', label: 'Real Estate / Duplex', icon: '🏠', path: 'data/REAL_ESTATE.md' }
            ];

            const activeFileInfo = files.find(f => f.id === activeFile);

            // Sync content when file changes
            useEffect(() => {
                setEditContent(content);
                setIsEditing(false);
                setStatusMsg('');
            }, [activeFile, content]);

            const handleSave = async () => {
                if (!ghToken) {
                    const token = prompt("Please enter your GitHub Personal Access Token (PAT) with 'repo' scope to enable saving:");
                    if (!token) return;
                    localStorage.setItem('GH_PAT', token);
                    setGhToken(token);
                }

                setStatusMsg('⏳ Saving to GitHub...');
                
                try {
                    // 1. Get current SHA
                    const path = activeFileInfo.path;
                    const repo = "info430/alfred-dashboard";
                    const getRes = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                        headers: { "Authorization": `token ${localStorage.getItem('GH_PAT')}` }
                    });
                    
                    if (!getRes.ok) throw new Error("Failed to fetch file info. Check Token.");
                    const getData = await getRes.json();
                    
                    // 2. Commit Update
                    const putRes = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                        method: "PUT",
                        headers: {
                            "Authorization": `token ${localStorage.getItem('GH_PAT')}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            message: `Update ${path} via Dashboard`,
                            content: btoa(unescape(encodeURIComponent(editContent))), // Handle UTF-8
                            sha: getData.sha
                        })
                    });

                    if (!putRes.ok) throw new Error("Failed to commit update.");
                    
                    setStatusMsg('✅ Saved! Changes will live update shortly.');
                    setIsEditing(false);
                    // Optimistic update locally? We need to bubble this up if we want it to stick in session
                    // For now, page refresh or parent update handles it.
                    
                } catch (err) {
                    console.error(err);
                    setStatusMsg(`❌ Error: ${err.message}`);
                    if (err.message.includes('Token')) localStorage.removeItem('GH_PAT');
                }
            };

            return (
                <div className="flex h-full gap-6">
                    {/* Left Sidebar for Files */}
                    <div className="w-64 flex-shrink-0 bg-navy-800/50 rounded-xl border border-slate-700/30 overflow-hidden">
                        <div className="p-4 border-b border-slate-700/30">
                            <h3 className="font-bold text-slate-300">Knowledge Base</h3>
                        </div>
                        <div className="p-2 space-y-1">
                            {files.map(f => (
                                <button
                                    key={f.id}
                                    onClick={() => setActiveFile(f.id)}
                                    className={`w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-colors ${
                                        activeFile === f.id ? 'bg-accent-blue/20 text-accent-blue' : 'text-slate-400 hover:bg-slate-700/50 hover:text-slate-200'
                                    }`}
                                >
                                    {f.icon} {f.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Right Content Area */}
                    <div className="flex-1 bg-navy-800/30 rounded-xl border border-slate-700/30 relative flex flex-col overflow-hidden">
                        <div className="absolute top-4 right-4 z-20 flex gap-2 items-center">
                            {statusMsg && <span className="text-xs text-slate-300 bg-navy-900 px-2 py-1 rounded border border-slate-600">{statusMsg}</span>}
                            
                            {!isEditing ? (
                                <button 
                                    onClick={() => setIsEditing(true)}
                                    className="flex items-center gap-2 px-3 py-1.5 bg-navy-900 border border-slate-600 rounded text-xs text-slate-300 hover:text-white hover:border-accent-blue transition-colors"
                                >
                                    ✏️ Edit
                                </button>
                            ) : (
                                <>
                                    <button 
                                        onClick={() => setIsEditing(false)}
                                        className="px-3 py-1.5 bg-red-900/50 border border-red-700/50 rounded text-xs text-red-200 hover:bg-red-900"
                                    >
                                        Cancel
                                    </button>
                                    <button 
                                        onClick={handleSave}
                                        className="px-3 py-1.5 bg-green-600 border border-green-500 rounded text-xs text-white hover:bg-green-500 font-bold"
                                    >
                                        💾 Save Changes
                                    </button>
                                </>
                            )}
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-8 custom-scrollbar">
                            {isEditing ? (
                                <textarea 
                                    className="w-full h-full bg-navy-900/50 text-slate-300 font-mono text-sm p-4 rounded-lg border border-slate-700 focus:border-accent-blue focus:outline-none resize-none"
                                    value={editContent}
                                    onChange={(e) => setEditContent(e.target.value)}
                                />
                            ) : (
                                <div className="prose prose-invert prose-sm max-w-none" dangerouslySetInnerHTML={{__html: marked.parse(content || '')}}></div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [activeDoc, setActiveDoc] = useState('user');
            const [dashboardContent, setDashboardContent] = useState('');
            const [logsContent, setLogsContent] = useState('');

            useEffect(() => {
                setDashboardContent(`# 🦅 Alfred's Mission Control
**Last Sync:** ${new Date().toLocaleDateString()}

## 🚦 Priority Status
| Project | Status | Next Action | Owner |
| :--- | :--- | :--- | :--- |
| **Finance Engine** | 🟢 **Live** | Monitor daily briefings; Pay off $13k Debt | Alfred |
| **Real Estate** | 🟡 Research | Contact Easy Street Capital (DSCR) | Alfred |
| **Imperfect Win** | 🔵 Backlog | Define MVP Features | Gary |
| **Wedding** | 🟢 Planning | (Funded via Personal Budget) | Gary |
| **Utility Ops** | 🟢 Automated | Monthly Tenant Billing Protocol Active | Alfred |
| **GitHub** | 🟢 Connected | (info430) | Alfred |
`);
                setLogsContent(SNAPSHOT_DATA.logs);
            }, []);

            return (
                <div className="flex min-h-screen bg-navy-900 text-slate-200">
                    <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} />
                    
                    <main className="ml-64 flex-1 p-8 h-screen overflow-hidden">
                        {activeTab === 'dashboard' && <DashboardView data={dashboardContent} />}
                        {activeTab === 'finance' && <FinanceView />}
                        {activeTab === 'docs' && (
                            <DocsView 
                                activeFile={activeDoc} 
                                setActiveFile={setActiveDoc} 
                                content={SNAPSHOT_DATA[activeDoc]} 
                                setContent={(newContent) => {
                                    SNAPSHOT_DATA[activeDoc] = newContent;
                                    // Trigger re-render by toggling activeDoc or state? 
                                    // React state update is cleaner.
                                    // But SNAPSHOT_DATA is const. Let's make it state-backed if we want instant preview.
                                    // For now, this is enough to let the child update itself.
                                }}
                            />
                        )}
                        {activeTab === 'logs' && <MarkdownView title="Activity Log (Memory)" content={logsContent} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
