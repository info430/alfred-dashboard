<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlfredOS Dashboard</title>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: {
                            900: '#0f172a', // Deepest background
                            800: '#1e293b', // Sidebar/Panel
                            700: '#334155', // Cards
                        },
                        accent: {
                            purple: '#7c3aed',
                            teal: '#2dd4bf',
                            blue: '#3b82f6'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        /* Custom scrollbar for dark theme */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Components ---

        const Sidebar = ({ activeTab, setActiveTab }) => (
            <div className="w-64 bg-navy-800 h-screen fixed left-0 top-0 flex flex-col border-r border-slate-700/50">
                <div className="p-6 flex flex-col items-center border-b border-slate-700/50">
                    <div className="w-24 h-24 rounded-full bg-slate-600 mb-4 overflow-hidden ring-2 ring-accent-purple shadow-lg shadow-accent-purple/20 relative">
                        {/* Placeholder Avatar - Replace with generated image URL if hosted */}
                        <div className="w-full h-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-3xl">🤵</div>
                        <div className="absolute bottom-1 right-1 w-4 h-4 bg-green-500 rounded-full border-2 border-navy-800"></div>
                    </div>
                    <h2 className="text-xl font-bold text-white">Alfred</h2>
                    <span className="text-xs text-accent-teal uppercase tracking-wider font-semibold mt-1">Operational</span>
                </div>
                
                <nav className="flex-1 p-4 space-y-2">
                    {[
                        { id: 'dashboard', label: 'Dashboard', icon: '📊' },
                        { id: 'docs', label: 'Knowledge Base', icon: '🧠' },
                        { id: 'logs', label: 'Activity Log', icon: '📝' },
                    ].map(tab => (
                        <button
                            key={tab.id}
                            onClick={() => setActiveTab(tab.id)}
                            className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 ${
                                activeTab === tab.id 
                                ? 'bg-accent-purple text-white shadow-lg shadow-accent-purple/20' 
                                : 'text-slate-400 hover:bg-slate-700/50 hover:text-white'
                            }`}
                        >
                            <span>{tab.icon}</span>
                            <span className="font-medium">{tab.label}</span>
                        </button>
                    ))}
                </nav>

                <div className="p-4 border-t border-slate-700/50">
                    <div className="bg-navy-900/50 rounded-lg p-3 text-xs text-slate-400">
                        <div className="flex justify-between mb-1">
                            <span>System Status</span>
                            <span className="text-green-400">Normal</span>
                        </div>
                        <div className="w-full bg-slate-700 h-1 rounded-full overflow-hidden">
                            <div className="bg-green-500 w-full h-full"></div>
                        </div>
                    </div>
                </div>
            </div>
        );

        const KanbanCard = ({ task }) => (
            <div className="bg-navy-700 p-4 rounded-lg shadow-sm border border-slate-600/30 hover:border-accent-blue/50 hover:translate-y-[-2px] transition-all cursor-pointer group">
                <div className="flex justify-between items-start mb-2">
                    <span className={`px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider ${
                        task.status.includes('Needs') ? 'bg-red-500/20 text-red-400' :
                        task.status.includes('Track') ? 'bg-green-500/20 text-green-400' :
                        'bg-blue-500/20 text-blue-400'
                    }`}>
                        {task.status.replace('🔴 ', '').replace('🟢 ', '').replace('🟡 ', '').replace('🔵 ', '').replace('⚪ ', '')}
                    </span>
                    <span className="text-slate-500 text-xs">{task.owner}</span>
                </div>
                <h4 className="font-semibold text-slate-200 mb-2">{task.project}</h4>
                <p className="text-sm text-slate-400 leading-relaxed">{task.action}</p>
            </div>
        );

        const KanbanColumn = ({ title, tasks, count }) => (
            <div className="flex-1 min-w-[300px] bg-navy-800/50 rounded-xl flex flex-col h-full border border-slate-700/30">
                <div className="p-4 flex items-center justify-between border-b border-slate-700/30">
                    <h3 className="font-bold text-slate-300 flex items-center gap-2">
                        {title}
                        <span className="bg-slate-700 text-slate-300 text-xs px-2 py-0.5 rounded-full">{count}</span>
                    </h3>
                    <button className="text-slate-500 hover:text-white">•••</button>
                </div>
                <div className="p-3 space-y-3 overflow-y-auto flex-1 custom-scrollbar">
                    {tasks.map((task, i) => <KanbanCard key={i} task={task} />)}
                </div>
            </div>
        );

        const DashboardView = ({ data }) => {
            if (!data) return <div className="text-slate-500 p-8">Loading dashboard data...</div>;

            // Parse the markdown table from DASHBOARD.md
            // This is a naive parser for the specific format in DASHBOARD.md
            const lines = data.split('\n');
            const tasks = [];
            let parsingTable = false;

            lines.forEach(line => {
                if (line.includes('| Project | Status |')) {
                    parsingTable = true;
                    return;
                }
                if (parsingTable && line.trim().startsWith('|') && !line.includes('---')) {
                    const parts = line.split('|').map(p => p.trim()).filter(p => p);
                    if (parts.length >= 4) {
                        tasks.push({
                            project: parts[0].replace(/\*\*/g, ''),
                            status: parts[1],
                            action: parts[2],
                            owner: parts[3]
                        });
                    }
                }
                if (parsingTable && line.trim() === '') parsingTable = false;
            });

            const todoTasks = tasks.filter(t => t.status.includes('Needs') || t.status.includes('Research'));
            const progressTasks = tasks.filter(t => t.status.includes('Track') || t.status.includes('Planning') || t.status.includes('Connected'));
            const doneTasks = tasks.filter(t => t.status.includes('Closed') || t.status.includes('Done'));

            return (
                <div className="h-full flex flex-col">
                    <header className="mb-6 flex justify-between items-end">
                        <div>
                            <h1 className="text-3xl font-bold text-white mb-1">Mission Control</h1>
                            <p className="text-slate-400 text-sm">Overview of active operations and priorities.</p>
                        </div>
                        <div className="flex gap-2">
                            <button className="px-3 py-1.5 bg-navy-700 hover:bg-navy-600 rounded text-sm text-slate-300 border border-slate-600">Sync Now</button>
                        </div>
                    </header>
                    
                    <div className="flex-1 flex gap-6 overflow-x-auto pb-4">
                        <KanbanColumn title="Action Required" tasks={todoTasks} count={todoTasks.length} />
                        <KanbanColumn title="In Progress" tasks={progressTasks} count={progressTasks.length} />
                        <KanbanColumn title="Done / Closed" tasks={doneTasks} count={doneTasks.length} />
                    </div>
                </div>
            );
        };

        const MarkdownView = ({ title, content }) => (
             <div className="max-w-4xl mx-auto h-full overflow-y-auto pr-4">
                <h1 className="text-3xl font-bold text-white mb-6 sticky top-0 bg-navy-900 py-4 z-10 border-b border-slate-700/50">{title}</h1>
                <div className="prose prose-invert prose-slate max-w-none" dangerouslySetInnerHTML={{ __html: marked.parse(content || '') }}></div>
            </div>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [dashboardContent, setDashboardContent] = useState('');
            const [userContent, setUserContent] = useState('');
            const [soulContent, setSoulContent] = useState('');
            const [logsContent, setLogsContent] = useState('');

            useEffect(() => {
                // In a real deployed scenario, these would fetch from the raw GitHub URL
                // For this demo, we'll simulate or try to fetch if local
                // Assuming files are in the same repo for GitHub Pages
                
                // Placeholder content for demo purposes if fetch fails (or initial load)
                // Real implementation: fetch('./DASHBOARD.md').then(...)
                
                const loadFile = async (file, setter) => {
                    try {
                        const res = await fetch(file);
                        if (res.ok) {
                            const text = await res.text();
                            setter(text);
                        } else {
                            setter('*Error loading file. Make sure file exists in repo.*');
                        }
                    } catch (e) {
                        setter('*Loading...*');
                    }
                };

                // For the purpose of this immediate artifact, I will embed the current known state
                // This allows the HTML file to work immediately without fetching if CORS is an issue locally
                // But in the repo, I'll set it up to fetch.
                
                // SIMULATED FETCH for the static file generation:
                setDashboardContent(`# 🦅 Alfred's Dashboard\n**Last Updated:** 2026-02-21\n\n## 🚦 Priority Status\n| Project | Status | Next Action | Owner |\n| :--- | :--- | :--- | :--- |\n| **Real Estate** | 🟡 Research | List top 3 DSCR lenders for travel nurse rentals | Alfred |\n| **Imperfect Win** | 🟢 On Track | Define launch checklist (MVP features) | Gary |\n| **Wandyr** | 🔵 Backlog | (Pending prioritization) | Gary |\n| **Wedding** | 🟢 Planning | (Ad-hoc tasks as needed) | Gary |\n| **GitHub** | 🟢 Connected | (info430) Ready for issues/PR management | Alfred |\n| **Sixt Dispute** | ⚪ Closed | Resolved (car exchanged, no further action) | Alfred |\n\n## ⚠️ Decisions Needed\n* **LinkedIn Access:** Do we connect via browser (need creds) or stick to manual updates?\n* **Voice Mode:** libasound2 missing. Proceed text-only or fix system permissions?`);
                
                // In the real repo version, we will uncomment these:
                // loadFile('DASHBOARD.md', setDashboardContent);
                // loadFile('USER.md', setUserContent);
                // loadFile('SOUL.md', setSoulContent);
                // loadFile('CONVERSATIONS.md', setLogsContent);
            }, []);

            return (
                <div className="flex min-h-screen bg-navy-900 text-slate-200">
                    <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} />
                    
                    <main className="ml-64 flex-1 p-8 h-screen overflow-hidden">
                        {activeTab === 'dashboard' && <DashboardView data={dashboardContent} />}
                        {activeTab === 'docs' && (
                            <div className="grid grid-cols-2 gap-8 h-full">
                                <div className="bg-navy-800/30 p-6 rounded-xl border border-slate-700/30 overflow-y-auto">
                                    <h2 className="text-xl font-bold text-accent-teal mb-4 sticky top-0 bg-navy-800/90 p-2 rounded">USER.md (Context)</h2>
                                    <div className="prose prose-invert prose-sm" dangerouslySetInnerHTML={{__html: marked.parse(userContent || '*Fetch USER.md content here*')}}></div>
                                </div>
                                <div className="bg-navy-800/30 p-6 rounded-xl border border-slate-700/30 overflow-y-auto">
                                    <h2 className="text-xl font-bold text-accent-purple mb-4 sticky top-0 bg-navy-800/90 p-2 rounded">SOUL.md (Operating System)</h2>
                                    <div className="prose prose-invert prose-sm" dangerouslySetInnerHTML={{__html: marked.parse(soulContent || '*Fetch SOUL.md content here*')}}></div>
                                </div>
                            </div>
                        )}
                        {activeTab === 'logs' && <MarkdownView title="Activity Logs" content={logsContent || '*Fetch CONVERSATIONS.md content here*'} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
