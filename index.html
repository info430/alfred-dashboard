<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlfredOS Dashboard</title>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' },
                        accent: { purple: '#7c3aed', teal: '#2dd4bf', blue: '#3b82f6', green: '#10b981', red: '#ef4444' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

        // --- Live Data (Injected by Alfred) ---
        const financeData = {
            netWorth: 21545,
            liquid: 35000,
            debt: 13455,
            savingsRate: 73,
            history: [
                { date: 'Feb 1', nw: 18000 },
                { date: 'Feb 8', nw: 19500 },
                { date: 'Feb 15', nw: 20200 },
                { date: 'Feb 22', nw: 21545 }
            ]
        };

        const Sidebar = ({ activeTab, setActiveTab }) => (
            <div className="w-64 bg-navy-800 h-screen fixed left-0 top-0 flex flex-col border-r border-slate-700/50">
                <div className="p-6 flex flex-col items-center border-b border-slate-700/50">
                    <div className="w-24 h-24 rounded-full bg-slate-600 mb-4 overflow-hidden ring-2 ring-accent-purple shadow-lg shadow-accent-purple/20 relative">
                        <div className="w-full h-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-3xl">🤵</div>
                        <div className="absolute bottom-1 right-1 w-4 h-4 bg-green-500 rounded-full border-2 border-navy-800"></div>
                    </div>
                    <h2 className="text-xl font-bold text-white">Alfred</h2>
                    <span className="text-xs text-accent-teal uppercase tracking-wider font-semibold mt-1">Operational</span>
                </div>
                <nav className="flex-1 p-4 space-y-2">
                    {[
                        { id: 'dashboard', label: 'Mission Control', icon: '🚀' },
                        { id: 'finance', label: 'Financials', icon: '💰' },
                        { id: 'docs', label: 'Knowledge Base', icon: '🧠' },
                        { id: 'logs', label: 'Activity Log', icon: '📝' },
                    ].map(tab => (
                        <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                            className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 ${
                                activeTab === tab.id ? 'bg-accent-purple text-white shadow-lg' : 'text-slate-400 hover:bg-slate-700/50 hover:text-white'
                            }`}>
                            <span>{tab.icon}</span><span className="font-medium">{tab.label}</span>
                        </button>
                    ))}
                </nav>
            </div>
        );

        const StatCard = ({ title, value, subtext, color }) => (
            <div className={`bg-navy-800 p-6 rounded-xl border border-slate-700/50 hover:border-${color}-500/50 transition-all`}>
                <h3 className="text-slate-400 text-sm font-medium uppercase tracking-wider mb-2">{title}</h3>
                <div className={`text-3xl font-bold text-${color}-400 mb-1`}>{value}</div>
                <div className="text-slate-500 text-xs">{subtext}</div>
            </div>
        );

        const KanbanCard = ({ task }) => (
            <div className="bg-navy-700 p-4 rounded-lg shadow-sm border border-slate-600/30 hover:border-accent-blue/50 hover:translate-y-[-2px] transition-all cursor-pointer group">
                <div className="flex justify-between items-start mb-2">
                    <span className={`px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider ${
                        task.status.includes('Needs') ? 'bg-red-500/20 text-red-400' :
                        task.status.includes('Track') ? 'bg-green-500/20 text-green-400' :
                        'bg-blue-500/20 text-blue-400'
                    }`}>
                        {task.status.replace('🔴 ', '').replace('🟢 ', '').replace('🟡 ', '').replace('🔵 ', '').replace('⚪ ', '')}
                    </span>
                    <span className="text-slate-500 text-xs">{task.owner}</span>
                </div>
                <h4 className="font-semibold text-slate-200 mb-2">{task.project}</h4>
                <p className="text-sm text-slate-400 leading-relaxed">{task.action}</p>
            </div>
        );

        const KanbanColumn = ({ title, tasks, count }) => (
            <div className="flex-1 min-w-[300px] bg-navy-800/50 rounded-xl flex flex-col h-full border border-slate-700/30">
                <div className="p-4 flex items-center justify-between border-b border-slate-700/30">
                    <h3 className="font-bold text-slate-300 flex items-center gap-2">
                        {title}
                        <span className="bg-slate-700 text-slate-300 text-xs px-2 py-0.5 rounded-full">{count}</span>
                    </h3>
                </div>
                <div className="p-3 space-y-3 overflow-y-auto flex-1 custom-scrollbar">
                    {tasks.map((task, i) => <KanbanCard key={i} task={task} />)}
                </div>
            </div>
        );

        const DashboardView = ({ data }) => {
            if (!data) return <div className="text-slate-500 p-8">Loading dashboard data...</div>;
            
            const lines = data.split('\n');
            const tasks = [];
            let parsingTable = false;

            lines.forEach(line => {
                if (line.includes('| Project | Status |')) { parsingTable = true; return; }
                if (parsingTable && line.trim().startsWith('|') && !line.includes('---')) {
                    const parts = line.split('|').map(p => p.trim()).filter(p => p);
                    if (parts.length >= 4) {
                        tasks.push({
                            project: parts[0].replace(/\*\*/g, ''),
                            status: parts[1],
                            action: parts[2],
                            owner: parts[3]
                        });
                    }
                }
                if (parsingTable && line.trim() === '') parsingTable = false;
            });

            const todoTasks = tasks.filter(t => t.status.includes('Needs') || t.status.includes('Research') || t.status.includes('Backlog'));
            const progressTasks = tasks.filter(t => t.status.includes('Track') || t.status.includes('Planning') || t.status.includes('Connected') || t.status.includes('Automated') || t.status.includes('Live'));
            const doneTasks = tasks.filter(t => t.status.includes('Closed') || t.status.includes('Done'));

            return (
                <div className="h-full flex flex-col">
                    <header className="mb-6">
                        <h1 className="text-3xl font-bold text-white mb-1">Mission Control</h1>
                        <p className="text-slate-400 text-sm">Overview of active operations.</p>
                    </header>
                    <div className="flex-1 flex gap-6 overflow-x-auto pb-4">
                        <KanbanColumn title="Action Required" tasks={todoTasks} count={todoTasks.length} />
                        <KanbanColumn title="In Progress / Active" tasks={progressTasks} count={progressTasks.length} />
                        <KanbanColumn title="Completed" tasks={doneTasks} count={doneTasks.length} />
                    </div>
                </div>
            );
        };

        const FinanceView = () => (
            <div className="h-full overflow-y-auto pr-2">
                <header className="mb-8">
                    <h1 className="text-3xl font-bold text-white mb-2">Financial Pulse</h1>
                    <p className="text-slate-400">Live data from SimpleFIN & Beancount Ledger.</p>
                </header>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    <StatCard title="Net Worth" value={`$${financeData.netWorth.toLocaleString()}`} subtext="Liquid Assets - Debt" color="green" />
                    <StatCard title="Liquid Cash" value={`$${financeData.liquid.toLocaleString()}`} subtext="Checking + Savings + Brokerage" color="blue" />
                    <StatCard title="Total Debt" value={`-$${financeData.debt.toLocaleString()}`} subtext="Credit Cards (Amex/Chase)" color="red" />
                    <StatCard title="Feb Savings Rate" value={`${financeData.savingsRate}%`} subtext="Income vs Expenses" color="accent-teal" />
                </div>
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                    <div className="bg-navy-800 p-6 rounded-xl border border-slate-700/50 h-[300px]">
                        <h3 className="text-lg font-bold text-white mb-4">Net Worth Trend (Feb)</h3>
                        <ResponsiveContainer width="100%" height="100%">
                            <LineChart data={financeData.history}>
                                <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
                                <XAxis dataKey="date" stroke="#94a3b8" />
                                <YAxis stroke="#94a3b8" />
                                <Tooltip contentStyle={{ backgroundColor: '#1e293b', border: 'none' }} />
                                <Line type="monotone" dataKey="nw" stroke="#2dd4bf" strokeWidth={2} />
                            </LineChart>
                        </ResponsiveContainer>
                    </div>
                    <div className="bg-navy-800 p-6 rounded-xl border border-slate-700/50">
                        <h3 className="text-lg font-bold text-white mb-4">Recent Big Expenses</h3>
                        <div className="space-y-3">
                            {[
                                { date: 'Feb 18', to: 'TECO Gas (Combined)', amt: '-$299.04', cat: 'Utilities' },
                                { date: 'Feb 18', to: 'Hertz Car Rental', amt: '-$207.64', cat: 'Travel' },
                                { date: 'Feb 14', to: 'Publix', amt: '-$145.20', cat: 'Groceries' },
                                { date: 'Feb 12', to: 'Berns Steak House', amt: '-$174.00', cat: 'Dining' },
                            ].map((tx, i) => (
                                <div key={i} className="flex justify-between items-center p-3 bg-navy-900/50 rounded-lg">
                                    <div>
                                        <div className="font-medium text-slate-200">{tx.to}</div>
                                        <div className="text-xs text-slate-500">{tx.date} • {tx.cat}</div>
                                    </div>
                                    <div className="text-red-400 font-mono">{tx.amt}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        );

        const MarkdownView = ({ title, content }) => (
             <div className="max-w-4xl mx-auto h-full overflow-y-auto pr-4 pb-20">
                <h1 className="text-3xl font-bold text-white mb-6 sticky top-0 bg-navy-900 py-4 z-10 border-b border-slate-700/50">{title}</h1>
                <div className="prose prose-invert prose-slate max-w-none" dangerouslySetInnerHTML={{ __html: marked.parse(content || '') }}></div>
            </div>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [dashboardContent, setDashboardContent] = useState('');
            const [userContent, setUserContent] = useState('');
            const [soulContent, setSoulContent] = useState('');
            const [logsContent, setLogsContent] = useState('');

            useEffect(() => {
                const loadFile = async (file, setter) => {
                    try {
                        const res = await fetch(`data/${file}?t=${Date.now()}`);
                        if (res.ok) {
                            const text = await res.text();
                            setter(text);
                        } else {
                            setter(`*Content for ${file} not found. Ensure it is pushed to data/ folder.*`);
                        }
                    } catch (e) {
                        setter('*Loading error...*');
                    }
                };

                loadFile('USER.md', setUserContent);
                loadFile('SOUL.md', setSoulContent);
                loadFile('LOGS.md', setLogsContent);
                
                // Set Dashboard Status
                setDashboardContent(`# 🦅 Alfred's Mission Control
**Last Sync:** ${new Date().toLocaleDateString()}

## 🚦 Priority Status
| Project | Status | Next Action | Owner |
| :--- | :--- | :--- | :--- |
| **Finance Engine** | 🟢 **Live** | Monitor daily briefings; Pay off $13k Debt | Alfred |
| **Real Estate** | 🟡 Research | Contact Easy Street Capital (DSCR) | Alfred |
| **Imperfect Win** | 🔵 Backlog | Define MVP Features | Gary |
| **Wedding** | 🟢 Planning | (Funded via Personal Budget) | Gary |
| **Utility Ops** | 🟢 Automated | Monthly Tenant Billing Protocol Active | Alfred |
| **GitHub** | 🟢 Connected | (info430) | Alfred |
`);
            }, []);

            return (
                <div className="flex min-h-screen bg-navy-900 text-slate-200">
                    <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} />
                    
                    <main className="ml-64 flex-1 p-8 h-screen overflow-hidden">
                        {activeTab === 'dashboard' && <DashboardView data={dashboardContent} />}
                        {activeTab === 'finance' && <FinanceView />}
                        {activeTab === 'docs' && (
                            <div className="grid grid-cols-2 gap-8 h-full">
                                <div className="bg-navy-800/30 p-6 rounded-xl border border-slate-700/30 overflow-y-auto">
                                    <h2 className="text-xl font-bold text-accent-teal mb-4 sticky top-0 bg-navy-800/90 p-2 rounded">USER.md (Context)</h2>
                                    <div className="prose prose-invert prose-sm" dangerouslySetInnerHTML={{__html: marked.parse(userContent || '')}}></div>
                                </div>
                                <div className="bg-navy-800/30 p-6 rounded-xl border border-slate-700/30 overflow-y-auto">
                                    <h2 className="text-xl font-bold text-accent-purple mb-4 sticky top-0 bg-navy-800/90 p-2 rounded">SOUL.md (Operating System)</h2>
                                    <div className="prose prose-invert prose-sm" dangerouslySetInnerHTML={{__html: marked.parse(soulContent || '')}}></div>
                                </div>
                            </div>
                        )}
                        {activeTab === 'logs' && <MarkdownView title="Activity Log (Memory)" content={logsContent} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
